<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aloqa Portali</title>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
       (function(){
          // Akkauntingizdan olingan haqiqiy Public Key avtomat joylashtirildi
          emailjs.init("H1luAASSU7byhrhMr"); 
       })();
    </script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 450px;
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            font-size: 22px;
            color: #00adb5;
        }

        .input-group {
            text-align: left;
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #ccc;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #333;
            border-radius: 6px;
            background: #2a2a2a;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus {
            border-color: #00adb5;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #00adb5;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background: #007c82;
        }

        button:disabled {
            background: #444;
            cursor: not-allowed;
        }

        .status-msg {
            margin-top: 15px;
            font-size: 14px;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Biz bilan bog'lanish</h2>
        <p style="color: #888; font-size: 14px; margin-bottom: 20px;">Fikringiz yoki taklifingizni qoldiring:</p>
        
        <form id="contactForm">
            <div class="input-group">
                <label>Ismingiz:</label>
                <input type="text" id="userName" required placeholder="Masalan: Alisher">
            </div>

            <div class="input-group">
                <label>Email manzilingiz:</label>
                <input type="email" id="userEmail" required placeholder="example@mail.com">
            </div>

            <div class="input-group">
                <label>Xabaringiz:</label>
                <textarea id="userMessage" rows="4" required placeholder="Xabarni shu yerga yozing..."></textarea>
            </div>
            
            <button type="submit" id="sendBtn">Xabarni yuborish</button>
        </form>

        <div class="status-msg" id="statusMsg"></div>
    </div>

    <script>
        document.getElementById('contactForm').addEventListener('submit', function(event) {
            event.preventDefault();
            
            const sendBtn = document.getElementById('sendBtn');
            const statusMsg = document.getElementById('statusMsg');
            
            sendBtn.disabled = true;
            sendBtn.innerText = "Yuborilmoqda...";
            statusMsg.style.display = 'none';

            // EmailJS shablonidagi o'zgaruvchilar bilan bog'lash
            let templateParams = {
                name: document.getElementById('userName').value,
                email: document.getElementById('userEmail').value,
                title: "Veb-saytdan yangi xabar",
                message: document.getElementById('userMessage').value
            };

            // EmailJS orqali yuborish
            // DIQQAT: 'YOUR_TEMPLATE_ID' o'rniga o'zingiz yaratgan andoza kodini qo'ying
            emailjs.send('service_8u5qqkm', 'YOUR_TEMPLATE_ID', templateParams)
                .then(function(response) {
                    statusMsg.style.display = 'block';
                    statusMsg.style.color = '#39ea7c';
                    statusMsg.innerText = "✓ Xabaringiz muvaffaqiyatli yuborildi!";
                    sendBtn.innerText = "Xabarni yuborish";
                    sendBtn.disabled = false;
                    document.getElementById('contactForm').reset();
                }, function(error) {
                    statusMsg.style.display = 'block';
                    statusMsg.style.color = '#ff5252';
                    statusMsg.innerText = "✕ Tizimda xatolik yuz berdi. Qayta urining.";
                    sendBtn.innerText = "Xabarni yuborish";
                    sendBtn.disabled = false;
                });
        });
    </script>
</body>
</html>
